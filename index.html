<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#F0F2F7;--card:#FFF;--navy:#0A0F1E;--dk:#161B2E;--accent:#2563EB;--sky:#38BDF8;--green:#10B981;--red:#EF4444;--amber:#F59E0B;--text:#0F172A;--sub:#475569;--muted:#94A3B8;--border:#E2E8F0;--r:16px;--rs:12px;--safe-b:env(safe-area-inset-bottom,0px)}
html,body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;height:100dvh}
.hdr{background:linear-gradient(145deg,#070B16,#0F1B3D);padding:max(env(safe-area-inset-top),12px) 16px 0;flex-shrink:0}

.hdr h1{font-size:18px;font-weight:800;color:#fff}.hdr h1 em{font-style:normal;color:var(--sky)}

.yr-pills{display:flex;gap:4px}

.yr-btn.on{background:var(--sky);color:var(--navy);border-color:var(--sky)}
.stats{display:flex;gap:5px;padding:0 12px 8px;background:linear-gradient(145deg,#070B16,#0F1B3D);flex-shrink:0}
.st{flex:1;background:rgba(255,255,255,.04);border-radius:10px;padding:8px 4px;text-align:center;border:1px solid rgba(255,255,255,.05)}
.st .n{font-size:20px;font-weight:800;line-height:1}.st .l{font-size:7px;color:#94A3B8;text-transform:uppercase;letter-spacing:.7px;margin-top:2px;font-weight:700}
.st:nth-child(1) .n{color:#60A5FA}.st:nth-child(2) .n{color:#FBBF24}.st:nth-child(3) .n{color:#F87171}.st:nth-child(4) .n{color:#34D399}
.yr-bar{background:linear-gradient(145deg,#070B16,#0F1B3D);padding:0 16px 10px;flex-shrink:0}

.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 12px 110px;overscroll-behavior:contain}
.tabs{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:4px 0 max(var(--safe-b),5px);z-index:100}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:4px 2px;background:none;border:none;cursor:pointer;font-family:inherit;transition:all .15s}
.tb svg{width:20px;height:20px;stroke:var(--muted);fill:none;stroke-width:1.8}.tb span{font-size:9px;font-weight:600;color:var(--muted)}
.tb.on svg{stroke:var(--accent)}.tb.on span{color:var(--accent);font-weight:700}
.fab{position:fixed;bottom:calc(58px + var(--safe-b));right:14px;width:48px;height:48px;border-radius:14px;background:var(--accent);color:#fff;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 16px rgba(37,99,235,.4);z-index:90;display:flex;align-items:center;justify-content:center;transition:transform .15s}

.card-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.cd-prog div{height:100%;border-radius:2px}
.card-exp{padding:0 14px 12px}
.card-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px 10px;margin-bottom:8px}
.cf{padding:4px 0}.cf .k{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;font-weight:700}.cf .v{font-size:12px;font-weight:600;color:var(--text)}
.cf .v.ok{color:var(--green)}.cf .v.warn{color:var(--red)}.cf .v.money{color:var(--accent)}
.card-notes{font-size:12px;color:var(--sub);line-height:1.5;padding:6px 0;border-top:1px solid var(--border)}
.card-btns{display:flex;gap:5px;padding-top:8px}
.cbtn{flex:1;padding:9px;border-radius:10px;border:none;font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;transition:transform .1s}
.cbtn:active{transform:scale(.95)}
.cbtn.edit{background:#EFF6FF;color:var(--accent)}.cbtn.del{background:#FEF2F2;color:var(--red)}.cbtn.cls{background:#ECFDF5;color:#059669}.cbtn.rcv{background:#F3E8FF;color:#7C3AED}
.ck{list-style:none;padding:0;margin:6px 0}
.ck li{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.ck li:last-child{border:none}
.ckb{width:18px;height:18px;border-radius:5px;border:2px solid var(--border);background:var(--bg);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ckb.dn{background:var(--green);border-color:var(--green)}.ckb.dn::after{content:'✓';color:#fff;font-size:10px;font-weight:800}
.ck-text{flex:1}.ck-text.dn{text-decoration:line-through;color:var(--muted)}
.ck-del{color:var(--red);font-size:10px;cursor:pointer;padding:2px 4px}
.ck-add-shell,.tm-add-shell{margin-top:6px}.inline-trigger{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:9px 14px;border-radius:12px;border:1.5px dashed #C8D4EA;background:#F8FBFF;color:var(--accent);font-family:inherit;font-size:11px;font-weight:800;cursor:pointer;transition:all .15s}.inline-trigger:active{transform:scale(.98)}.inline-form{margin-top:8px;padding:10px;background:#F8FAFC;border:1px solid var(--border);border-radius:14px}.inline-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.inline-btn{padding:9px 12px;border-radius:10px;border:none;font-family:inherit;font-size:11px;font-weight:800;cursor:pointer}.inline-btn.primary{background:var(--accent);color:#fff}.inline-btn.secondary{background:#E2E8F0;color:#334155}.inline-btn.ghost{background:#F8FAFC;color:#64748B;border:1px solid var(--border)}.ck-add{display:flex;gap:6px}.ck-add input{flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:12px;font-family:inherit;font-size:13px;background:#fff;outline:none}.tm{list-style:none;padding:0;margin:6px 0}.tm li{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}.tm li:last-child{border:none}.tm-main{flex:1;min-width:0}.tm-title{font-size:12px;font-weight:600;color:var(--text);line-height:1.35}.tm-title.dn{text-decoration:line-through;color:var(--muted)}.tm-sub{font-size:10px;color:var(--muted);margin-top:2px}.tm-pill{display:inline-flex;align-items:center;justify-content:center;min-width:74px;padding:4px 8px;border-radius:999px;font-size:10px;font-weight:800;line-height:1}.tm-pill.green{background:#D1FAE5;color:#065F46}.tm-pill.amber{background:#FEF3C7;color:#92400E}.tm-pill.red{background:#FEE2E2;color:#991B1B}.tm-pill.gray{background:#E2E8F0;color:#475569}.tm-add{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,.62fr) 88px;gap:6px;align-items:center}.tm-add input{padding:10px 12px;border:1.5px solid var(--border);border-radius:12px;font-family:inherit;font-size:13px;background:#fff;outline:none}@media (max-width:430px){.tm-add{grid-template-columns:minmax(0,1fr) minmax(0,.62fr) 82px}.inline-trigger{width:100%;justify-content:center}.inline-actions .inline-btn{flex:1}}
.ect{margin:0 14px 6px;padding:8px 12px;border-radius:10px;background:linear-gradient(135deg,#FEF3C7,#FDE68A)}

function addDD(bank,method,bonus,date,meta={}){const bankName=String(bank||'').trim();const methodName=String(method||'').trim();if(!bankName||!methodName)return;const rows=loadUserDatapoints();const sig=(bankName+'|'+methodName).toLowerCase();const idx=rows.findIndex(r=>(String(r.bank||'').trim()+'|'+String(r.method||'').trim()).toLowerCase()===sig);if(idx>=0){rows[idx].note=String(meta.note||rows[idx].note||'').trim();rows[idx].lastConfirmedAt=date||rows[idx].lastConfirmedAt||td();rows[idx].updatedAt=td();if(meta.entryId)rows[idx].entryId=meta.entryId}else{rows.unshift(normalizeUserDatapoint({bank:bankName,method:methodName,note:meta.note||'',date:date||td(),entryId:meta.entryId||''}))}saveUserDatapoints(rows)}

function normalizeTCText(text){
  return(text||'')
    .replace(/\u00A0/g,' ')
    .replace(/[“”]/g,'"')
    .replace(/[‘’]/g,"'")
    .replace(/[•●▪◦‣]/g,' • ')
    .replace(/[–—]/g,'-')
    .replace(/\r/g,'\n')
    .replace(/\t/g,' ')
    .replace(/\n[ \t]+/g,'\n')
    .replace(/[ ]{2,}/g,' ')
    .replace(/\n{3,}/g,'\n\n')
    .trim()
}
function tcParseWordNumber(token){
  if(token===undefined||token===null)return null;
  const raw=String(token).toLowerCase().trim().replace(/[^a-z0-9-]/g,'');
  if(/^\d+$/.test(raw))return parseInt(raw,10);
  const map={one:1,two:2,three:3,four:4,five:5,six:6,seven:7,eight:8,nine:9,ten:10,eleven:11,twelve:12,thirteen:13,fourteen:14,fifteen:15,sixteen:16,seventeen:17,eighteen:18,twenty:20,twentyfour:24,'twenty-four':24,thirty:30,sixty:60,ninety:90,onehundred:100,'one-hundred':100};
  return map[raw]??null
}
function tcMoney(v){if(v===undefined||v===null||v==='')return'';return'$'+String(v).replace(/[^\d.]/g,'').replace(/\B(?=(\d{3})+(?!\d))/g,',')}
function tcSegments(text){
  const normalized=normalizeTCText(text);
  const rawLines=normalized.split(/\n+/).map(s=>s.trim()).filter(Boolean);
  const out=[];const seen=new Set();
  const pushSeg=s=>{const seg=(s||'').trim();if(seg.length<3||seen.has(seg))return;seen.add(seg);out.push(seg)};
  rawLines.forEach(line=>{
    const cleaned=line.replace(/^[\-*•]+\s*/,'').trim();
    if(!cleaned)return;
    pushSeg(cleaned);
    cleaned.split(/(?<=[.!?;:])\s+(?=[A-Z0-9$])/).forEach(pushSeg)
  });
  return out
}
function tcScoreSegment(segment,keywords=[],negativeKeywords=[]){
  const s=(segment||'').toLowerCase();
  let score=0;
  keywords.forEach(k=>{if(s.includes(k))score+=4});
  negativeKeywords.forEach(k=>{if(s.includes(k))score-=5});
  if(/bonus|qualify|requirement|eligibility|fee|direct deposit|transaction|maintain|new money|good standing/.test(s))score+=1;
  return score
}
function tcPickBest(segments,patterns,opts={}){
  const hits=[];
  segments.forEach((segment,idx)=>{
    patterns.forEach((cfg,pIndex)=>{
      const m=segment.match(cfg.pattern);
      if(!m)return;
      let value=cfg.value?cfg.value(m,segment):m[1];
      if(value===undefined||value===null||value==='')return;
      const score=(cfg.base||0)+tcScoreSegment(segment,opts.keywords||[],opts.negativeKeywords||[])-Math.min(idx,20)*0.05-pIndex*0.01;
      hits.push({value,segment,score,match:m[0]})
    })
  });
  hits.sort((a,b)=>b.score-a.score);
  return hits[0]||null
}
function tcCollectDollars(segments,keywords=[],negativeKeywords=[],requireBonusContext=false){
  const vals=[];const seen=new Set();
  segments.forEach(seg=>{
    const low=seg.toLowerCase();
    if(keywords.length&&!keywords.some(k=>low.includes(k)))return;
    if(negativeKeywords.some(k=>low.includes(k)))return;
    if(requireBonusContext&&!/(bonus|credit|incentive)/i.test(seg))return;
    for(const m of seg.matchAll(/\$([\d,]+(?:\.\d+)?)/g)){

    }
  });

}

function tcApplyHybridPatterns(r, normalized, segments){
  if(!r.offerTags) r.offerTags=[];
  if(!r.evidence) r.evidence=[];
  r.hybridScore = r.hybridScore || 0;
  const t = normalized.toLowerCase();

  HYBRID_PROMO_PATTERNS.forEach(p=>{
    try{
      if(p.test(t, segments, r)) p.apply(r, {t, segments, r});
    }catch(_err){}
  });

  if(r.bonusAmount) r.hybridScore += 10;
  if(r.timeline || r.timelineDays) r.hybridScore += 6;
  if(r.earlyCloseFee || r.earlyCloseDays) r.hybridScore += 4;
  if(r.churnMonths || r.priorBonusIneligible) r.hybridScore += 4;
  if(r.statementCycleCutoff) r.hybridScore += 4;
  if(r.minDaysOpen || r.mustBePositiveAtQualEnd || r.mustBePositiveAtPayout) r.hybridScore += 6;
  if(r.openBy || r.openWindow) r.hybridScore += 3;
  if(r.monthlyFee) r.hybridScore += 2;

  if(r.hybridScore >= 40) r.hybridConfidence='High';
  else if(r.hybridScore >= 24) r.hybridConfidence='Medium';
  else r.hybridConfidence='Low';

  if(!r.reviewFlags) r.reviewFlags=[];
  if(!r.bonusAmount) tcPushUnique(r.reviewFlags, 'Bonus amount not clearly extracted.');
  if(!r.timeline && !r.timelineDays) tcPushUnique(r.reviewFlags, 'Qualification deadline not clearly extracted.');
  if(r.qualifyingPaths?.length===0 && !r.ddAmount && !r.newMoneyAmount && !r.activityCount && !r.debitTxns) {
    tcPushUnique(r.reviewFlags, 'Qualification path is unclear — review manually.');
  }
  if(r.ddAmount && r.newMoneyAmount) tcPushUnique(r.reviewFlags, 'Contains both direct-deposit and funding/new-money rules.');
}

function tcSplitOfferSections(text){
  const normalized = normalizeTCText(text);
  const parts = normalized
    .split(/(?:^|\n)(?=\d+\s*[A-Z])/m)
    .map(s => s.trim())
    .filter(Boolean);
  return parts.length ? parts : [normalized];
}

function tcChoosePrimaryOffer(results){
  if(!results.length) return null;
  const checking = results.find(r =>
    /checking/i.test(r?.acctType || '') ||
    /checking/i.test(r?.sectionTitle || '') ||
    /checking/i.test(r?.rawSection || '')
  );
  if(checking) return checking;
  return [...results].sort((a,b)=>{
    const av = parseFloat(String(a?.bonusAmount || '').replace(/[^\d.]/g,'')) || 0;
    const bv = parseFloat(String(b?.bonusAmount || '').replace(/[^\d.]/g,'')) || 0;
    return bv-av;
  })[0] || null;
}

function analyzeTC(text){
  if(!text||text.length<20)return null;
  const sections = tcSplitOfferSections(text);
  const results = sections
    .map(sec => analyzeTCSection(sec))
    .filter(Boolean);
  if(!results.length) return null;
  const primary = tcChoosePrimaryOffer(results);
  if(!primary) return null;
  primary.allOffers = results.map(r => ({
    sectionTitle: r.sectionTitle || r.acctType || r.bankName || 'Offer',
    bonusAmount: r.bonusAmount || '',
    acctType: r.acctType || '',
    notesForTracker: r.notesForTracker || ''
  }));
  return primary;
}

function analyzeTCSection(text){

  if(!text||text.length<20)return null;

  // Normalize pasted T&C first so regex works on cleaner text.
  const normalized=normalizeTCText(text);
  const t=normalized.toLowerCase();
  const segments=tcSegments(normalized);
  const r={};
  const review=[];

  r.rawSection=normalized;
  const titleHit=normalized.match(/^\d+\s*([^\n:]+)(?::|$)/m);
  if(titleHit) r.sectionTitle=titleHit[1].trim();

  r.qualifyingPaths=[];
  r.ddExamples=[];
  r.directDebitExamples=[];
  r.eligibilityNotes=[];
  r.payoutConditions=[];
  r.restrictionNotes=[];
  r.offerTags=[];
  r.evidence=[];
  r.hybridScore=0;
  r.hybridConfidence='Low';

  /* ---------- core promo fields ---------- */
  r.bankName=tcKnownBankName(normalized)||undefined;
  const bonusHit=tcPickBest(segments,[
    {pattern:/(?:bonus|credit|incentive|cash\s+bonus)\s+(?:of\s+)?\$([\d,]+)/i,value:m=>tcMoney(m[1]),base:22},
    {pattern:/\$([\d,]+)\s+(?:cash\s+)?(?:bonus|credit|incentive)/i,value:m=>tcMoney(m[1]),base:21},
    {pattern:/(?:earn|receive|get)\s+(?:a\s+)?\$([\d,]+)/i,value:m=>tcMoney(m[1]),base:18},
    {pattern:/\$([\d,]+)\s+(?:will\s+be\s+)?(?:credited|deposited|paid)/i,value:m=>tcMoney(m[1]),base:15}
  ],{keywords:['bonus','credit','incentive','earn','receive'],negativeKeywords:['monthly fee','maintenance fee','opening deposit','minimum opening deposit','maintain','new money','termination fee']});
  if(bonusHit)r.bonusAmount=bonusHit.value;
  const bonusTierSet=new Set();
  segments.forEach(seg=>{for(const m of seg.matchAll(/(?:bonus|credit|incentive)[^$]{0,24}\$([\d,]+)|\$([\d,]+)\s+(?:cash\s+)?(?:bonus|credit|incentive)/gi)){const amt=tcMoney(m[1]||m[2]);if(amt)bonusTierSet.add(amt)}});
  let bonusTiers=[...bonusTierSet];
  if(r.bonusAmount){const base=parseFloat(String(r.bonusAmount).replace(/[^\d.]/g,''))||0;if(base>0)bonusTiers=bonusTiers.filter(v=>{const amt=parseFloat(String(v).replace(/[^\d.]/g,''))||0;return !amt||amt<=Math.max(base*3,1500)})}
  if(bonusTiers.length>1)r.bonusTiers=bonusTiers.join(' / ');

  const promoHit=tcPickBest(segments,[
    {pattern:/promo(?:tional)?\s+code\s*[:\s]*["']?([A-Z0-9-]{4,})["']?/i,value:m=>m[1],base:20},
    {pattern:/promo(?:tional)?\s+code.*?\b([A-Z0-9-]{4,})\b/i,value:m=>m[1],base:18},
    {pattern:/(?:use|enter|apply)\s+(?:the\s+)?(?:promo\s+)?code.*?\b([A-Z0-9-]{4,})\b/i,value:m=>m[1],base:17}
  ],{keywords:['promo code','code','campaign','variant'],negativeKeywords:['1099','tax']});
  if(promoHit)r.promoCode=promoHit.value;

  // Offer section / open-by / qualifying-period signals

/* One-time ID repair: safely upgrades legacy/incorrect IDs to the smart
   short format based on each entry's current bank name and type. Only the
   id field is touched; all user data remains intact. */
function repairEntryIds(list){
  const src=Array.isArray(list)?list:[];
  const used=new Set();
  const seqByKey={};
  let changed=false;
  const repaired=src.map((entry,idx)=>{
    const e={...entry};
    const bank=e.bank||'';
    const key=bankKey(bank||('Bank '+(idx+1)));
    const prefix=bankCode(bank||'Bank')+'-'+bankTypeCode(bank)+'-';
    const rawId=String(e.id||'').toUpperCase().trim();
    const smart=/^[A-Z0-9]{3}-[PB]-\d{2}$/;
    if(smart.test(rawId)&&rawId.startsWith(prefix)&&!used.has(rawId)){
      used.add(rawId);
      seqByKey[key]=Math.max(seqByKey[key]||0,parseInt(rawId.slice(-2),10)||0);
      e.id=rawId;
      return e;
    }
    let next=Math.max((seqByKey[key]||0)+1,1);
    let fixed=prefix+String(next).padStart(2,'0');
    while(used.has(fixed)){
      next++;
      fixed=prefix+String(next).padStart(2,'0');
    }
    seqByKey[key]=next;
    used.add(fixed);
    if(e.id!==fixed)changed=true;
    e.id=fixed;
    return e;
  });
  return{items:repaired,changed};
}

    if(r.newMoneyAmount) steps.push('Deposit '+r.newMoneyAmount+' of new money'+(r.newMoneyDays?' within '+r.newMoneyDays+' days':''));
    if(r.maintainBalance||r.maintainDays) steps.push('Maintain '+(r.maintainBalance||'required balance')+(r.maintainDays?' for '+r.maintainDays+' days':''));
    if(r.activityCount) steps.push('Complete '+r.activityCount+' qualifying transactions'+(r.activityDays?' within '+r.activityDays+' days':''));
    if(r.debitTxns) steps.push('Complete '+r.debitTxns+' debit card transactions');
  }
  if(r.mustRemainOpen) steps.push('Keep account open until bonus payout');
  if(r.requiresGoodStanding) steps.push('Keep account in good standing');
  const elig=[];
  if(r.residency) elig.push(r.residency);
  if(r.currentCustomerIneligible) elig.push('Current customers not eligible');
  if(r.churnMonths) elig.push(r.churnMonths+'-month restriction');
  if(r.priorBonusIneligible) elig.push('Previous bonus recipients not eligible');
  if(r.limitOneBonus) elig.push(/business/i.test(r.acctType||r.bankName||'') ? 'One bonus per business/entity' : 'One bonus per customer/account');
  if(r.primaryOwnerOnly) elig.push('Bonus paid to primary owner only');
  let monthlyFeeYN='';
  const mf=String(r.monthlyFee||'').trim();
  if(mf){
    if(mf==='$0 (No fee)' || /no fee/i.test(mf)) monthlyFeeYN='No';
    else if(mf!=='Not clearly stated in pasted T&C') monthlyFeeYN='Yes';
  } else if(r.feeWaiver){ monthlyFeeYN='Yes'; }
  let earlyTerm='';
  if(r.earlyCloseFee && String(r.earlyCloseFee).trim()!=='None'){
    earlyTerm=String(r.earlyCloseFee).trim();
    if(r.earlyCloseDays) earlyTerm+=' if closed within '+r.earlyCloseDays+' days';
  } else if(r.earlyCloseDays){
    earlyTerm='Fee applies if closed within '+r.earlyCloseDays+' days';
  }
  const requiredDays=Math.max(parseInt(r.timelineDays||0,10)||0,parseInt(r.newMoneyDays||0,10)||0,parseInt(r.maintainDays||0,10)||0,parseInt(r.activityDays||0,10)||0,parseInt(r.minDaysOpen||0,10)||0);
  return {
    monthlyFeeYNText: monthlyFeeYN,
    promoCodeText: r.promoCode || '',
    avoidMonthlyFeeText: r.feeWaiver || '',
    completeBonusText: steps.map((s,i)=>(i+1)+'. '+s).join('\n'),
    earlyTerminationFeeText: earlyTerm,
    eligibilityText: elig.join(' | '),
    expirationDateText: normalizePromoWindowText(r.openBy || r.openWindow || ''),
    requiredDaysText: requiredDays ? String(requiredDays) : ''
  };
}
