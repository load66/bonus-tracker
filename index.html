<script>
(function(){
  let wrapped=false, applying=false;
  function callPatch(name){try{if(typeof window[name]==='function')window[name]()}catch(e){}}
  function applyCleanUi(){
    if(applying)return;
    applying=true;
    try{
      try{if(typeof tab!=='undefined' && String(tab).toLowerCase()==='health')tab='tracker'}catch(e){}
      callPatch('btRemoveHealthTabApply');
      callPatch('btCardStatusFlowPolishApply');
      callPatch('btToolsFolderFabApply');
      callPatch('btActionButtonSafetyApply');
      callPatch('btEditActionsRenderFixApply');
      callPatch('btTimerDeleteFixApply');
      callPatch('btFieldPolishPatchApply');
    }finally{applying=false}
  }
  function wrapRender(){
    if(wrapped||typeof window.R!=='function')return false;
    const baseRender=window.R;
    window.R=function(){
      document.body.classList.add('bt-rendering');
      try{
        const result=baseRender.apply(this,arguments);
        applyCleanUi();
        return result;
      }finally{
        requestAnimationFrame(()=>document.body.classList.remove('bt-rendering'));
      }
    };
    wrapped=true;
    try{window.R()}catch(e){applyCleanUi();document.body.classList.remove('bt-rendering')}
    return true;
  }
  function boot(){if(!wrapRender())setTimeout(boot,50)}
  window.btRenderStabilizerApply=applyCleanUi;
  boot();
  setTimeout(applyCleanUi,100);
  setTimeout(applyCleanUi,600);
  setTimeout(applyCleanUi,1400);
})();
</script>
